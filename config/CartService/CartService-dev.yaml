server:
  port: 8084
eureka:
  instance:
    hostname: cart-service
    prefer-ip-address: false
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:9000/realms/springmarket
  kafka:
    bootstrap-servers: broker-1:29094,broker-2:39094,broker-3:49094
    consumer:
      auto-offset-reset: earliest
      group-id: order-consumer-group
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.json.trusted.packages: by.cryptic.springmarket.*
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: by.cryptic.utils.event.DomainEvent
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false
  datasource:
    url: jdbc:postgresql://postgres:5432/cart_db
    username: cart_service
    password: cart_pass
  data:
    mongodb:
      uri: mongodb://mongo-db:27017/cartDB
  flyway:
    enabled: true
    locations: classpath:sql