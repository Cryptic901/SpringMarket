networks:
  spring-market:
    driver: bridge

services:
  controller-1:
    image: apache/kafka:latest
    container_name: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "19093:9093"
    networks:
      - spring-market
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost:9093" ]
      interval: 10s
      timeout: 5s
      retries: 10

  controller-2:
    image: apache/kafka:latest
    container_name: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29093:9093"
    networks:
      - spring-market
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost:9093" ]
      interval: 10s
      timeout: 5s
      retries: 10

  controller-3:
    image: apache/kafka:latest
    container_name: controller-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "39093:9093"
    networks:
      - spring-market
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost:9093" ]
      interval: 10s
      timeout: 5s
      retries: 10

  broker-1:
    image: apache/kafka:latest
    container_name: broker-1
    depends_on:
      controller-1:
        condition: service_healthy
      controller-2:
        condition: service_healthy
      controller-3:
        condition: service_healthy
    ports:
      - "29092:9092"
      - "29094:9094"
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:9092,PLAINTEXT_HOST://localhost:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - spring-market
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10

  broker-2:
    image: apache/kafka:latest
    container_name: broker-2
    depends_on:
      controller-1:
        condition: service_healthy
      controller-2:
        condition: service_healthy
      controller-3:
        condition: service_healthy
      broker-1:
        condition: service_started
    ports:
      - "39092:9092"
      - "39094:9094"
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-2:9092,PLAINTEXT_HOST://localhost:39094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - spring-market
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10

  broker-3:
    image: apache/kafka:latest
    container_name: broker-3
    depends_on:
      controller-1:
        condition: service_healthy
      controller-2:
        condition: service_healthy
      controller-3:
        condition: service_healthy
      broker-1:
        condition: service_started
      broker-2:
        condition: service_started
    ports:
      - "49092:9092"
      - "49094:9094"
    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-3:9092,PLAINTEXT_HOST://localhost:49094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - spring-market
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-db:
    image: redis:8.2-m01
    container_name: redis-db
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - spring-market

  keycloak-db:
    image: postgres:latest
    container_name: keycloak-db
    restart: always
    ports:
      - "5400:5432"
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - spring-market
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --health-enabled=true --metrics-enabled=true
    environment:
      KC_HOSTNAME: keycloak
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "9000:8080"
    volumes:
      - ./providers:/opt/keycloak/providers
    restart: always
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - spring-market

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: on-failure:3
    networks:
      - spring-market

  mongo-db:
    image: mongo:4.4
    container_name: mongo-db
    ports:
      - "27017:27017"
    restart: always
    networks:
      - spring-market
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./services/ConfigServer
      dockerfile: Dockerfile
    container_name: config-server
    restart: always
    ports:
      - "8888:8888"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      zipkin:
        condition: service_healthy

  eureka-server:
    build:
      context: ./services/EurekaServer
      dockerfile: Dockerfile
    container_name: eureka
    restart: always
    ports:
      - "8761:8761"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server

  gateway:
    build:
      context: ./services/Gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: always
    ports:
      - "8080:8080"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server

  postgres:
    container_name: postgres
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - spring-market
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  analytic-service:
    build:
      context: ./services/AnalyticService
      dockerfile: Dockerfile
    container_name: analytic-service
    restart: on-failure:3
    ports:
      - "8085:8085"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - redis-db
      - broker-1
      - broker-2
      - broker-3

  cart-service:
    build:
      context: ./services/CartService
      dockerfile: Dockerfile
    container_name: cart-service
    restart: on-failure:3
    ports:
      - "8084:8084"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

  notification-service:
    build:
      context: ./services/NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    restart: on-failure:3
    ports:
      - "8089:8089"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8089/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - broker-1
      - broker-2
      - broker-3

  order-service:
    build:
      context: ./services/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    restart: on-failure:3
    ports:
      - "8082:8082"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

  payment-service:
    build:
      context: ./services/PaymentService
      dockerfile: Dockerfile
    container_name: payment-service
    restart: on-failure:3
    ports:
      - "8088:8088"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

  product-service:
    build:
      context: ./services/ProductService
      dockerfile: Dockerfile
    container_name: product-service
    restart: on-failure:3
    ports:
      - "8081:8081"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

  review-service:
    build:
      context: ./services/ReviewService
      dockerfile: Dockerfile
    container_name: review-service
    restart: on-failure:3
    ports:
      - "8083:8083"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

  saga-service:
    build:
      context: ./services/SagaService
      dockerfile: Dockerfile
    container_name: saga-service
    restart: on-failure:3
    ports:
      - "8090:8090"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8090/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

  user-service:
    build:
      context: ./services/UserService
      dockerfile: Dockerfile
    container_name: user-service
    restart: on-failure:3
    ports:
      - "8086:8086"
    networks:
      - spring-market
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - config-server
      - eureka-server
      - postgres
      - mongo-db
      - broker-1
      - broker-2
      - broker-3

volumes:
  keycloak_data:
    driver: local
  redis_data:
  mongo_data:
  postgres_data: