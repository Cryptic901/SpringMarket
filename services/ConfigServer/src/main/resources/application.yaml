server:
  port: 8888
eureka:
  instance:
    hostname: config-server
    prefer-ip-address: false
spring:
  application:
    name: ConfigServer

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Cryptic901/SpringMarket
          clone-on-start: true
          search-paths: config/{application}
          default-label: master
  security:
    user:
      name: config
      password: config
  profiles:
    default: dev
    active: dev

management:
  tracing:
    enabled: false
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always